<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tony AI Font Factory</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface2: #21262d;
            --border: #30363d;
            --text: #e6edf3;
            --text2: #8b949e;
            --accent: #58a6ff;
            --green: #3fb950;
            --yellow: #d29922;
            --red: #f85149;
            --purple: #bc8cff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 { font-size: 20px; font-weight: 600; }
        .header h1 span { color: var(--accent); }
        .header-stats { display: flex; gap: 20px; font-size: 13px; color: var(--text2); }
        .header-stats b { color: var(--text); }

        /* Layout */
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

        /* New Font Form */
        .new-font {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .new-font h2 { font-size: 16px; margin-bottom: 16px; color: var(--accent); }
        .form-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input, .form-group select, .form-group textarea {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--accent);
        }
        .form-group textarea { resize: vertical; min-height: 60px; }

        /* Category pills */
        .categories { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .cat-pill {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            border: 1px solid var(--border);
            background: var(--surface2);
            cursor: pointer;
            transition: all .2s;
        }
        .cat-pill:hover, .cat-pill.active {
            border-color: var(--accent);
            background: rgba(88,166,255,.1);
            color: var(--accent);
        }

        /* Skip checkboxes */
        .skip-options { display: flex; gap: 16px; font-size: 13px; color: var(--text2); }
        .skip-options label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
        .skip-options input[type="checkbox"] { accent-color: var(--accent); }

        /* Buttons */
        .btn {
            padding: 8px 20px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all .2s;
        }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { background: #79c0ff; }
        .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
        .btn-danger { background: var(--red); color: #fff; }
        .btn-danger:hover { opacity: .8; }
        .btn-sm { padding: 4px 12px; font-size: 12px; }
        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text2);
        }
        .btn-ghost:hover { border-color: var(--text2); color: var(--text); }

        /* Font Grid */
        .grid-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .grid-header h2 { font-size: 16px; }
        .font-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
        }

        /* Font Card */
        .font-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            transition: border-color .2s;
        }
        .font-card:hover { border-color: var(--accent); }
        .card-preview {
            height: 180px;
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .card-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-preview .placeholder {
            color: var(--text2);
            font-size: 48px;
            letter-spacing: 4px;
            opacity: .3;
        }
        .card-body { padding: 14px; }
        .card-name { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
        .card-stats { display: flex; gap: 12px; font-size: 12px; color: var(--text2); margin-bottom: 10px; }
        .card-stats .stat { display: flex; align-items: center; gap: 4px; }
        .stage-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
        }
        .stage-done { background: rgba(63,185,80,.15); color: var(--green); }
        .stage-generated { background: rgba(210,153,34,.15); color: var(--yellow); }
        .stage-assembled { background: rgba(188,140,255,.15); color: var(--purple); }
        .stage-empty { background: rgba(139,148,158,.15); color: var(--text2); }
        .stage-running { background: rgba(88,166,255,.15); color: var(--accent); }
        .card-actions { display: flex; gap: 8px; margin-top: 10px; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.6);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 90%;
            max-width: 900px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 24px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-header h2 { font-size: 18px; }
        .modal-close {
            background: none;
            border: none;
            color: var(--text2);
            font-size: 24px;
            cursor: pointer;
        }

        /* Image grid in modal */
        .img-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
        }
        .img-grid img {
            width: 100%;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: var(--bg);
        }

        /* Log panel */
        .log-panel {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 12px;
            color: var(--green);
            max-height: 200px;
            overflow-y: auto;
            margin-top: 12px;
        }
        .log-line { margin-bottom: 2px; }
        .log-line.error { color: var(--red); }

        /* Running indicator */
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
        .running-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 1.5s infinite;
            margin-right: 6px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 200;
            transition: opacity .3s;
        }
        .toast-success { background: var(--green); color: #000; }
        .toast-error { background: var(--red); color: #fff; }

        /* Responsive */
        @media (max-width: 768px) {
            .form-row { flex-direction: column; }
            .font-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><span>Tony</span> AI Font Factory</h1>
        <div class="header-stats">
            <span>Fonts: <b id="totalFonts">0</b></span>
            <span>Done: <b id="doneFonts">0</b></span>
            <span>Running: <b id="runningJobs">0</b></span>
        </div>
    </div>

    <div class="container">
        <!-- New Font -->
        <div class="new-font">
            <h2>+ Tao Font Moi</h2>
            <div class="categories" id="categories"></div>
            <div class="form-row">
                <div class="form-group" style="flex:1">
                    <label>Ten Font</label>
                    <input type="text" id="fontName" placeholder="VD: BotanicalBloom">
                </div>
                <div class="form-group" style="flex:1">
                    <label>Family Name</label>
                    <input type="text" id="familyName" placeholder="VD: Botanical Bloom (de trong = tu tao)">
                </div>
            </div>
            <div class="form-group" style="margin-bottom:12px">
                <label>Style Prompt</label>
                <textarea id="stylePrompt" placeholder="Mo ta style cho Imagen 3..."></textarea>
            </div>
            <div class="skip-options" style="margin-bottom:12px">
                <label>Bo qua:</label>
                <label><input type="checkbox" id="skipGenerate"> Generate</label>
                <label><input type="checkbox" id="skipProcess"> Process</label>
                <label><input type="checkbox" id="skipAssemble"> Assemble</label>
                <label><input type="checkbox" id="skipQa"> QA</label>
                <label><input type="checkbox" id="skipMockup"> Mockup</label>
            </div>
            <button class="btn btn-primary" id="btnRun" onclick="startPipeline()">Chay Pipeline</button>
        </div>

        <!-- Font Grid -->
        <div class="grid-header">
            <h2>Danh Sach Font</h2>
            <button class="btn btn-ghost btn-sm" onclick="loadFonts()">Refresh</button>
        </div>
        <div class="font-grid" id="fontGrid"></div>
    </div>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">Font Detail</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
    let prompts = {};
    let pollers = {};

    // ── Init ──
    async function init() {
        await loadPrompts();
        await loadFonts();
        setInterval(loadFonts, 10000);
    }

    // ── Prompts ──
    async function loadPrompts() {
        const res = await fetch('/api/prompts');
        prompts = await res.json();
        const el = document.getElementById('categories');
        el.innerHTML = '';
        for (const [cat, prompt] of Object.entries(prompts)) {
            const pill = document.createElement('div');
            pill.className = 'cat-pill';
            pill.textContent = cat.replace('_', ' ');
            pill.onclick = () => {
                document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
                pill.classList.add('active');
                document.getElementById('stylePrompt').value = prompt;
            };
            el.appendChild(pill);
        }
    }

    // ── Fonts ──
    async function loadFonts() {
        const res = await fetch('/api/fonts');
        const fonts = await res.json();

        document.getElementById('totalFonts').textContent = fonts.length;
        document.getElementById('doneFonts').textContent = fonts.filter(f => f.stage === 'done').length;
        document.getElementById('runningJobs').textContent = Object.keys(pollers).length;

        const grid = document.getElementById('fontGrid');
        grid.innerHTML = '';

        for (const font of fonts) {
            grid.appendChild(createFontCard(font));
        }
    }

    function createFontCard(font) {
        const card = document.createElement('div');
        card.className = 'font-card';
        const isRunning = pollers[font.name];
        const stageCls = isRunning ? 'stage-running' : `stage-${font.stage}`;
        const stageText = isRunning ? `${pollers[font.name].stage}...` : font.stage;

        card.innerHTML = `
            <div class="card-preview" onclick="openDetail('${font.name}')">
                ${font.mockups > 0
                    ? `<img src="/output/${font.name}/mockups/${font.name}_hero_dark.png" onerror="this.parentElement.innerHTML='<div class=placeholder>ABC</div>'">`
                    : font.has_specimen
                    ? `<img src="/output/${font.name}/specimens/${font.name}_specimen.png" onerror="this.parentElement.innerHTML='<div class=placeholder>ABC</div>'">`
                    : `<div class="placeholder">ABC</div>`
                }
            </div>
            <div class="card-body">
                <div class="card-name">
                    ${isRunning ? '<span class="running-dot"></span>' : ''}
                    ${font.name}
                </div>
                <div class="card-stats">
                    <span class="stat">IMG: ${font.images}</span>
                    <span class="stat">SVG: ${font.svgs}</span>
                    <span class="stat">Font: ${font.fonts}</span>
                    <span class="stat">Mock: ${font.mockups}</span>
                    <span class="stage-badge ${stageCls}">${stageText}</span>
                </div>
                <div class="card-actions">
                    <button class="btn btn-ghost btn-sm" onclick="openDetail('${font.name}')">Chi tiet</button>
                    ${font.fonts > 0 ? `<button class="btn btn-ghost btn-sm" onclick="downloadFont('${font.name}')">Download</button>` : ''}
                    <button class="btn btn-danger btn-sm" onclick="deleteFont('${font.name}')">Xoa</button>
                </div>
            </div>
        `;
        return card;
    }

    // ── Pipeline ──
    async function startPipeline() {
        const name = document.getElementById('fontName').value.trim();
        const style = document.getElementById('stylePrompt').value.trim();
        const family = document.getElementById('familyName').value.trim();

        if (!name || !style) {
            showToast('Can nhap ten font va style prompt', 'error');
            return;
        }

        const skip = [];
        if (document.getElementById('skipGenerate').checked) skip.push('generate');
        if (document.getElementById('skipProcess').checked) skip.push('process');
        if (document.getElementById('skipAssemble').checked) skip.push('assemble');
        if (document.getElementById('skipQa').checked) skip.push('qa');
        if (document.getElementById('skipMockup').checked) skip.push('mockup');

        document.getElementById('btnRun').disabled = true;

        const res = await fetch('/api/run', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name, style, family: family || null, skip })
        });
        const data = await res.json();

        document.getElementById('btnRun').disabled = false;

        if (data.error) {
            showToast(data.error, 'error');
            return;
        }

        showToast(`Pipeline started: ${name}`, 'success');
        startPolling(name);
        loadFonts();
    }

    function startPolling(name) {
        pollers[name] = { stage: 'starting' };
        const interval = setInterval(async () => {
            const res = await fetch(`/api/run/${name}/status`);
            const data = await res.json();
            pollers[name].stage = data.stage;

            if (data.status === 'done') {
                clearInterval(interval);
                delete pollers[name];
                showToast(`${name} hoan thanh!`, 'success');
                loadFonts();
            } else if (data.status === 'error') {
                clearInterval(interval);
                delete pollers[name];
                showToast(`${name} loi: ${data.error}`, 'error');
                loadFonts();
            }

            document.getElementById('runningJobs').textContent = Object.keys(pollers).length;
        }, 3000);
    }

    // ── Detail Modal ──
    async function openDetail(name) {
        const res = await fetch(`/api/fonts/${name}`);
        const data = await res.json();

        document.getElementById('modalTitle').textContent = name;
        const body = document.getElementById('modalBody');

        let html = '';

        // Job status if running
        if (pollers[name]) {
            html += `<div class="log-panel" id="logPanel"></div>`;
        }

        // Images
        if (data.files.images.length > 0) {
            html += `<h3 style="margin:16px 0 8px;font-size:14px;color:var(--text2)">Generated Images (${data.files.images.length})</h3>`;
            html += '<div class="img-grid">';
            for (const f of data.files.images) {
                html += `<img src="/output/${name}/images/${f}" loading="lazy" title="${f}">`;
            }
            html += '</div>';
        }

        // SVGs
        if (data.files.svgs.length > 0) {
            html += `<h3 style="margin:16px 0 8px;font-size:14px;color:var(--text2)">SVGs (${data.files.svgs.length})</h3>`;
            html += '<div class="img-grid">';
            for (const f of data.files.svgs) {
                html += `<img src="/output/${name}/svgs/${f}" loading="lazy" title="${f}" style="background:#fff">`;
            }
            html += '</div>';
        }

        // Specimens
        if (data.files.specimens.length > 0) {
            html += `<h3 style="margin:16px 0 8px;font-size:14px;color:var(--text2)">Specimens</h3>`;
            for (const f of data.files.specimens) {
                html += `<img src="/output/${name}/specimens/${f}" style="width:100%;border-radius:8px;border:1px solid var(--border)">`;
            }
        }

        // Mockups
        if (data.files.mockups.length > 0) {
            html += `<h3 style="margin:16px 0 8px;font-size:14px;color:var(--text2)">Mockups (${data.files.mockups.length})</h3>`;
            html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px">';
            for (const f of data.files.mockups) {
                html += `<img src="/output/${name}/mockups/${f}" style="width:100%;border-radius:6px;border:1px solid var(--border)">`;
            }
            html += '</div>';
        }

        // Font files
        if (data.files.fonts.length > 0) {
            html += `<h3 style="margin:16px 0 8px;font-size:14px;color:var(--text2)">Font Files</h3>`;
            for (const f of data.files.fonts) {
                html += `<a href="/output/${name}/fonts/${f}" download style="display:inline-block;margin-right:12px;color:var(--accent);text-decoration:none">${f}</a>`;
            }
        }

        body.innerHTML = html;
        document.getElementById('modal').classList.add('active');

        // Poll log if running
        if (pollers[name]) {
            const logInterval = setInterval(async () => {
                if (!pollers[name]) { clearInterval(logInterval); return; }
                const res = await fetch(`/api/run/${name}/status`);
                const st = await res.json();
                const panel = document.getElementById('logPanel');
                if (panel) {
                    panel.innerHTML = st.log.map(l =>
                        `<div class="log-line ${l.startsWith('ERROR') ? 'error' : ''}">${l}</div>`
                    ).join('');
                    panel.scrollTop = panel.scrollHeight;
                }
            }, 2000);
        }
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('active');
    }

    // ── Actions ──
    async function deleteFont(name) {
        if (!confirm(`Xoa font "${name}" va tat ca files?`)) return;
        await fetch(`/api/fonts/${name}/delete`, { method: 'POST' });
        showToast(`Deleted ${name}`, 'success');
        loadFonts();
    }

    function downloadFont(name) {
        window.open(`/output/${name}/fonts/`, '_blank');
    }

    // ── Toast ──
    function showToast(msg, type = 'success') {
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
    }

    // ── Keyboard ──
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeModal();
    });

    init();
    </script>
</body>
</html>
